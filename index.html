<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hayyo Academy - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .login-container {
            background: white;
            border-radius: 0.5rem;
            padding: 2rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .login-logo h1 {
            font-size: 1.8rem;
            color: #0f6cbf;
            margin-bottom: 0.25rem;
        }

        .login-logo p {
            color: #6a737b;
            font-size: 0.85rem;
        }

        .login-form {
            margin-top: 1rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #1d2125;
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1px solid #8f959e;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 1rem;
            text-align: center;
        }

        .input-group input:focus {
            outline: none;
            border-color: #0f6cbf;
            box-shadow: 0 0 0 0.2rem rgba(15,108,191,0.25);
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background: #0f6cbf;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: #094478;
        }

        .login-btn:disabled {
            background: #8f959e;
            cursor: not-allowed;
        }

        .error-message {
            background: #f4d6d2;
            color: #ca3120;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.85rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #e9ecef;
            border-top-color: #0f6cbf;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .warning-text {
            text-align: center;
            margin-top: 1.5rem;
            padding: 0.75rem;
            background: #fff3cd;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            color: #856404;
        }

        footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #dee2e6;
            font-size: 0.7rem;
            color: #6a737b;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 1.5rem;
            }
            .login-logo h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-logo">
                <h1>🏫 Hayyo Academy</h1>
                <p>online ESSLCE-equivalent exam practice portal</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="name">Enter your name (only first name)</label>
                    <input type="text" 
                           id="name" 
                           name="name" 
                           placeholder=".............."
                           autocomplete="off"
                           required>
                </div>

                <div class="input-group">
                    <label for="password">Enter password</label>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           placeholder=".............."
                           autocomplete="off"
                           required>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">Log in</button>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 0.5rem; font-size: 0.8rem;">Verifying...</p>
                </div>
            </form>

            <div class="warning-text">
                ⚠️ Take screenshot or don't forget your name and password to login next time
            </div>

            <footer>
                © 2026 Hayyo Academy
            </footer>
        </div>
    </div>

    <script>
        // ============================================
        // HAYYO ACADEMY - LOGIN SYSTEM
        // ============================================
        
        // Your Apps Script URL
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1PJgEE4n_asYUROZWWjDSltmCl8etfAIX3QGXMk9O-sOxjuvmA0bI4_iIhbh79mh-VA/exec';
        
        const nameInput = document.getElementById('name');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const loading = document.getElementById('loading');

        // Remove error when user starts typing
        nameInput.addEventListener('input', function() {
            errorMessage.classList.remove('show');
        });
        
        passwordInput.addEventListener('input', function() {
            errorMessage.classList.remove('show');
        });

        // Handle form submission
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = nameInput.value.trim();
            const password = passwordInput.value.trim();
            
            // Validate fields
            if (!name) {
                errorMessage.textContent = 'Please enter your name.';
                errorMessage.classList.add('show');
                return;
            }
            
            if (!password) {
                errorMessage.textContent = 'Please enter your password.';
                errorMessage.classList.add('show');
                return;
            }

            // Show loading
            loginBtn.disabled = true;
            loading.classList.add('show');
            errorMessage.classList.remove('show');

            try {
                // Send to Apps Script
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `name=${encodeURIComponent(name)}&password=${encodeURIComponent(password)}`
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Store login info in localStorage
                    localStorage.setItem('hayyo_logged_in', 'true');
                    localStorage.setItem('hayyo_student_name', name);
                    localStorage.setItem('hayyo_password', password);
                    localStorage.setItem('hayyo_login_time', Date.now().toString());
                    
                    // Redirect to rounds page
                    window.location.href = 'rounds.html';
                } else {
                    errorMessage.textContent = result.message;
                    errorMessage.classList.add('show');
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'Unable to connect. Please check your internet connection.';
                errorMessage.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loading.classList.remove('show');
            }
        });

        // Check if already logged in (DISABLED - always show login page)
        function checkExistingSession() {
            const loggedIn = localStorage.getItem('hayyo_logged_in');
            const loginTime = localStorage.getItem('hayyo_login_time');
            
            if (loggedIn === 'true' && loginTime) {
                const timeSinceLogin = Date.now() - parseInt(loginTime);
                const SESSION_DURATION = 8 * 60 * 60 * 1000; // 8 hours
                
                if (timeSinceLogin < SESSION_DURATION) {
                    // Session still valid, redirect to rounds
                    window.location.href = 'rounds.html';
                } else {
                    // Session expired, clear storage
                    localStorage.removeItem('hayyo_logged_in');
                    localStorage.removeItem('hayyo_student_name');
                    localStorage.removeItem('hayyo_password');
                    localStorage.removeItem('hayyo_login_time');
                }
            }
        }
        
        // AUTO-REDIRECT DISABLED - Students will always see login page
        // To enable, remove the // below:
        // checkExistingSession();
    </script>
</body>
</html>
